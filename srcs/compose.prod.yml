services:
  waf:
    build:
      context: .
      dockerfile: ./waf/Dockerfile
    container_name: waf
    ports:
      - "8080:8080"
    depends_on:
      gateway:
        condition: service_healthy
      frontend:
        condition: service_started
    environment:
      - BACKEND=http://gateway:8081
      - FRONTEND=http://frontend:80
    networks:
      - microservices
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - microservices
    depends_on:
      - gateway

  main-service:
    build: ./backend/main_service
    container_name: main-service
    environment:
      HOSTNAME: main-service
      HOST_IP: main-service
      MARIADB_DATABASE: ${MARIADB_MAIN_DATABASE}
      MARIADB_USER: ${MARIADB_MAIN_USER}
      MARIADB_PASSWORD: ${MARIADB_MAIN_PASSWORD}
      DATABASE_URL: mysql://${MARIADB_MAIN_USER}:${MARIADB_MAIN_PASSWORD}@main-service-db:3306/${MARIADB_MAIN_DATABASE}
      HOST: 0.0.0.0
      FRONTEND_URL: http://localhost:8080
      BACKEND_URL: http://localhost:8080/api/main
      QUIZ_SERVICE_URL: http://quiz-service:3001/
      AI_SERVICE_URL: http://ai-service:3002/
      RAG_SERVICE_URL: http://rag-service:3003/
      CALLBACK_URL: http://localhost:8080/api/main/auth/google/callback
      PORT: 3000
    networks:
      - microservices
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      main-service-db:
        condition: service_healthy
  quiz-service:
    build: ./backend/quiz_service
    container_name: quiz-service
    environment:
      HOSTNAME: quiz-service
      HOST_IP: quiz-service
      MARIADB_DATABASE: ${MARIADB_QUIZ_DATABASE}
      MARIADB_USER: ${MARIADB_QUIZ_USER}
      MARIADB_PASSWORD: ${MARIADB_QUIZ_PASSWORD}
      DATABASE_URL: mysql://${MARIADB_QUIZ_USER}:${MARIADB_QUIZ_PASSWORD}@quiz-service-db:3306/${MARIADB_QUIZ_DATABASE}
      HOST: 0.0.0.0
      FRONTEND_URL: http://localhost:8080
    networks:
      - microservices
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      quiz-service-db:
        condition: service_healthy
###
  ai-service:
    build: ./backend/ai_services/ai_service
    container_name: ai-service
    environment:
      HOSTNAME: ai-service
      HOST_IP: ai-service
      FRONTEND_URL: http://localhost:8080
    networks:
      - microservices
    env_file:
      - .env
    ports:
      - "3002:3002"

  rag-service:
    build: ./backend/ai_services/rag_service
    container_name: rag-service
    environment:
      HOSTNAME: rag-service
      HOST_IP: rag-service
      FRONTEND_URL: http://localhost:8080
      OLLAMA_SERVER_URL: http://ollama-service:11434

    networks:
      - microservices
    env_file:
      - .env
    ports:
      - "3003:3003"
    depends_on:
      ollama-service:
        condition: service_healthy
  ollama-service:
    build: ./backend/ai_services/ollama_service
    container_name: ollama-service
    environment:
      HOSTNAME: ollama-service
      HOST_IP: ollama-service
    networks:
      - microservices
    env_file:
      - .env
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
##
  gateway:
    build: ./backend/gateway
    container_name: api-gateway
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - microservices
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
